<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airport Diagram Finder</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --face: #c0c0c0;
    --face-dark: #808080;
    --face-darker: #0a0a0a;
    --face-light: #ffffff;
    --face-soft: #dfdfdf;
    --titlebar-1: #000080;
    --titlebar-2: #1084d0;
    --text: #000000;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: Tahoma, "MS Sans Serif", "Segoe UI", Verdana, sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #008080;
    background-image:
      radial-gradient(circle at 20% 15%, rgba(255,255,255,0.05), transparent 40%),
      radial-gradient(circle at 80% 85%, rgba(0,0,0,0.08), transparent 40%);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .window {
    width: 100%;
    max-width: 430px;
    background: var(--face);
    box-shadow:
      inset -1px -1px 0 0 var(--face-darker),
      inset  1px  1px 0 0 var(--face-light),
      inset -2px -2px 0 0 var(--face-dark),
      inset  2px  2px 0 0 var(--face-soft);
    padding: 3px;
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 4px 3px 6px;
    background: linear-gradient(90deg, var(--titlebar-1), var(--titlebar-2));
    color: #fff;
    font-weight: bold;
    font-size: 13px;
    letter-spacing: 0.2px;
  }

  .titlebar-icon {
    display: inline-flex;
    width: 14px;
    height: 14px;
    flex: none;
  }

  .titlebar-text {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .titlebar-controls {
    display: flex;
    gap: 3px;
    flex: none;
  }

  .tb-btn {
    width: 16px;
    height: 14px;
    background: var(--face);
    color: #000;
    font-size: 10px;
    line-height: 12px;
    text-align: center;
    box-shadow:
      inset -1px -1px 0 0 var(--face-darker),
      inset  1px  1px 0 0 var(--face-light);
    user-select: none;
  }

  .window-body {
    padding: 14px 16px 10px;
  }

  .label {
    margin: 0 0 10px;
    line-height: 1.4;
  }

  .field-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    min-width: 0;
    font-family: "Courier New", Consolas, monospace;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 6px;
    border: none;
    background: #fff;
    box-shadow:
      inset -1px -1px 0 0 var(--face-light),
      inset  1px  1px 0 0 var(--face-darker),
      inset -2px -2px 0 0 var(--face-soft),
      inset  2px  2px 0 0 var(--face-dark);
  }

  input[type="text"]:disabled {
    background: var(--face-soft);
    color: var(--face-dark);
  }

  button {
    font-family: inherit;
    font-size: 14px;
    padding: 5px 16px;
    background: var(--face);
    border: none;
    box-shadow:
      inset -1px -1px 0 0 var(--face-darker),
      inset  1px  1px 0 0 var(--face-light),
      inset -2px -2px 0 0 var(--face-dark),
      inset  2px  2px 0 0 var(--face-soft);
    cursor: pointer;
  }

  button:active:not(:disabled) {
    box-shadow:
      inset -1px -1px 0 0 var(--face-light),
      inset  1px  1px 0 0 var(--face-darker),
      inset -2px -2px 0 0 var(--face-soft),
      inset  2px  2px 0 0 var(--face-dark);
    padding: 6px 15px 4px 17px;
  }

  button:disabled {
    color: var(--face-dark);
    cursor: default;
  }

  button:focus-visible,
  input[type="text"]:focus-visible {
    outline: 1px dotted #000;
    outline-offset: 1px;
  }

  .hint {
    margin: 10px 0 0;
    font-size: 12px;
    color: #333;
  }

  .statusbar {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    background: var(--face);
    box-shadow:
      inset -1px -1px 0 0 var(--face-light),
      inset  1px  1px 0 0 var(--face-darker),
      inset -2px -2px 0 0 var(--face-soft),
      inset  2px  2px 0 0 var(--face-dark);
    font-size: 12px;
    min-height: 18px;
  }

  .radar {
    flex: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #003300;
    box-shadow:
      inset -1px -1px 0 0 var(--face-light),
      inset  1px  1px 0 0 var(--face-darker);
    position: relative;
    overflow: hidden;
  }

  .radar::after {
    content: "";
    position: absolute;
    inset: 0;
    background: conic-gradient(from 0deg, #33ff33, transparent 30%);
    animation: sweep 1.6s linear infinite;
  }

  @keyframes sweep {
    to { transform: rotate(360deg); }
  }

  #statusText {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #cycleText {
    flex: none;
    color: #444;
  }
</style>
</head>
<body>

<main class="window">
  <div class="titlebar">
    <svg class="titlebar-icon" viewBox="0 0 16 16" aria-hidden="true">
      <path fill="#ffffff" d="M8 0 L9.6 5.6 L16 6.8 L9.6 8 L8 16 L6.4 8 L0 6.8 L6.4 5.6 Z"/>
    </svg>
    <span class="titlebar-text">Airport Diagram Finder</span>
    <div class="titlebar-controls" aria-hidden="true">
      <span class="tb-btn">_</span>
      <span class="tb-btn">▢</span>
      <span class="tb-btn">×</span>
    </div>
  </div>

  <div class="window-body">
    <p class="label" id="formLabel">Enter an airport identifier to open its current FAA airport diagram:</p>

    <form id="searchForm" autocomplete="off">
      <div class="field-row">
        <input
          type="text"
          id="icaoInput"
          maxlength="4"
          placeholder="KDSM"
          aria-labelledby="formLabel"
          disabled
        >
        <button type="submit" id="searchBtn" disabled>Search</button>
      </div>
    </form>

    <p class="hint">Accepts ICAO codes (KDSM) or FAA identifiers (DSM). Opens in a new tab.</p>

    <div class="statusbar" role="status" aria-live="polite">
      <span class="radar" aria-hidden="true"></span>
      <span id="statusText">Loading airport diagram database&hellip;</span>
      <span id="cycleText"></span>
    </div>
  </div>
</main>

<script>
(function () {
  var input = document.getElementById('icaoInput');
  var btn = document.getElementById('searchBtn');
  var form = document.getElementById('searchForm');
  var statusText = document.getElementById('statusText');
  var cycleText = document.getElementById('cycleText');

  var airports = null;

  fetch('airports.json', { cache: 'no-store' })
    .then(function (res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function (data) {
      airports = data.airports || {};
      input.disabled = false;
      btn.disabled = false;
      statusText.textContent = 'Ready.';
      if (data.cycle) {
        cycleText.textContent = 'Cycle ' + data.cycle;
      }
      input.focus();
    })
    .catch(function (err) {
      statusText.textContent = 'Could not load the airport database. Reload to try again.';
      console.error('Failed to load airports.json:', err);
    });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!airports) return;

    var code = input.value.trim().toUpperCase();
    if (!code) {
      statusText.textContent = 'Type an airport identifier first.';
      return;
    }

    var entry = airports[code];
    if (entry && entry.pdf) {
      statusText.textContent = 'Opening diagram for ' + code +
        (entry.name ? ' \u2014 ' + entry.name : '') + '\u2026';
      window.open(entry.pdf, '_blank', 'noopener');
    } else {
      statusText.textContent =
        'No current FAA airport diagram found for \u201c' + code + '.\u201d Check the identifier, or that airport may not publish one.';
    }
  });
})();
</script>

</body>
</html>
